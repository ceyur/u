<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Загрузка...</title>
    <!-- Используем абсолютный путь к иконке от корня проекта -->
    <link rel="icon" href="/u/img/favicon.ico">
    <script type="text/javascript">
        var l = window.location;
        // Находим часть пути, которая идет после "/u/"
        // Например: из "/u/value/information/" получим "value/information/"
        var pathAfterU = l.pathname.split('/u/')[1] || "";
        
        // Формируем новый URL: всегда возвращаемся в корень /u/
        var newUrl = l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
                     '/u/?p=' + encodeURIComponent(pathAfterU) + l.search + l.hash;
        
        l.replace(newUrl);
    </script>
</head>
<body></body>
</html>
