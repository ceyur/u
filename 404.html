<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Загрузка...</title>
    <link rel="icon" href="img/favicon.ico">
    <script type="text/javascript">
        // Перенаправляем на index.html и передаем путь в параметре ?p=
        var segmentCount = 1; // так как сайт в папке /u/
        var l = window.location;
        l.replace(
            l.protocol + "//" + l.hostname + "/" + l.pathname.split("/")[1] + "/?p=/" +
            l.pathname.split("/").slice(segmentCount + 1).join("/") + l.search
        );
    </script>
</head>
<body></body>
</html>
